<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · HailScout</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
        background: #F5F1EA; color: #2B2620; text-align: center; padding: 24px;
      }
      .wrap { max-width: 360px; }
      .ring { width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 9999px; border: 2px solid #0F4C5C; display: flex; align-items: center; justify-content: center; }
      .dot { width: 12px; height: 12px; border-radius: 9999px; background: #D87C4A; }
      h1 { font-size: 20px; margin: 0 0 8px; letter-spacing: -0.02em; }
      p { font-size: 14px; line-height: 1.55; color: #6B6052; margin: 0 0 20px; }
      button {
        font: inherit; font-weight: 600; font-size: 14px; color: #F5F1EA; background: #0F4C5C;
        border: 0; border-radius: 8px; padding: 10px 18px; cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1A1814; color: #F5F1EA; }
        p { color: #b8ad9c; }
        .ring { border-color: #5BA8BC; }
        button { background: #5BA8BC; color: #11201f; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring"><div class="dot"></div></div>
      <h1>You're offline</h1>
      <p>HailScout can't reach the network right now. Reconnect and we'll pick up where you left off — your last-loaded maps stay on screen.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
