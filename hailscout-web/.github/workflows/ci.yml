name: CI

on:
  push:
    branches:
      - main
    paths:
      - "hailscout-web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "hailscout-web/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    working-directory: hailscout-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: hailscout-web/package-lock.json

      - run: npm ci
        working-directory: hailscout-web

      - run: npm run lint
        working-directory: hailscout-web

  type-check:
    runs-on: ubuntu-latest
    working-directory: hailscout-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: hailscout-web/package-lock.json

      - run: npm ci
        working-directory: hailscout-web

      - run: npm run type-check
        working-directory: hailscout-web

  build:
    runs-on: ubuntu-latest
    working-directory: hailscout-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: hailscout-web/package-lock.json

      - run: npm ci
        working-directory: hailscout-web

      - run: npm run build
        working-directory: hailscout-web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_BASE_URL: https://api.hailscout.com
          NEXT_PUBLIC_TILES_BASE_URL: https://tiles.hailscout.com
