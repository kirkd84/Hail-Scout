# Alembic configuration for HailScout data pipeline

[alembic]
sqlalchemy.url = postgresql+psycopg2://hailscout:dev_password@localhost:5432/hailscout_dev
script_location = migrations
prepend_sys_path = .
version_path_separator = :
version_locations = %(here)s/migrations/versions

sqlalchemy.echo = false
sqlalchemy.echo_pool = false
sqlalchemy.url_queue_size = 10
sqlalchemy.pool_pre_ping = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
