# Ruff configuration for HailScout Data Pipeline

[lint]
line-length = 100
target-version = "py312"

# Enabled rule sets
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "C901",  # McCabe complexity
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "ARG",   # flake8-unused-arguments
    "PERF",  # Perflint
]

# Ignored rules
ignore = [
    "E501",  # line too long (handled by formatter)
    "W291",  # trailing whitespace (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
]

# Allow wildcard imports (for test fixtures)
allow-unused-imports = false

[lint.isort]
known-first-party = ["hailscout_pipeline"]
lines-between-types = 1

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
