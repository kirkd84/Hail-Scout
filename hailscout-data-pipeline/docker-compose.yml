version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hailscout-postgres
    environment:
      POSTGRES_USER: hailscout
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: hailscout_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hailscout"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: hailscout-network
