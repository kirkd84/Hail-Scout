name: CI

on:
  push:
    branches: [main]
    paths:
      - "hailscout-tiles/**"
  pull_request:
    branches: [main]
    paths:
      - "hailscout-tiles/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: hailscout-tiles/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('hailscout-tiles/poetry.lock') }}

      - name: Install dependencies
        working-directory: hailscout-tiles
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install

      - name: Lint with ruff
        working-directory: hailscout-tiles
        run: poetry run ruff check src tests

      - name: Type check with mypy
        working-directory: hailscout-tiles
        run: poetry run mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: hailscout_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: hailscout-tiles/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('hailscout-tiles/poetry.lock') }}

      - name: Install dependencies
        working-directory: hailscout-tiles
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install

      - name: Run tests
        working-directory: hailscout-tiles
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/hailscout_test
        run: poetry run pytest

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./hailscout-tiles/htmlcov/coverage.xml
          flags: tiles
          name: tiles-coverage
