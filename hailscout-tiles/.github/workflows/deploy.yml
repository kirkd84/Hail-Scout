name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "hailscout-tiles/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        working-directory: hailscout-tiles
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: hailscout-tiles
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        working-directory: hailscout-tiles
        env:
          ECS_CLUSTER: hailscout-tiles
          ECS_SERVICE: tile-gen-service
          ECS_TASK_DEFINITION: hailscout-tiles-task
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          # This would typically call a script or AWS CLI to update the task definition
          # and force a new deployment. For now, this is a placeholder.
          echo "Task definition update would occur here with image: $IMAGE"

  test-tile-generation:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify S3 bucket structure
        run: |
          aws s3 ls s3://${{ secrets.S3_BUCKET }}/swaths/ --recursive | head -20

      - name: Check CloudFront invalidation
        run: |
          # Verify CloudFront distribution is healthy
          aws cloudfront get-distribution-config --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            | jq '.DistributionConfig.Enabled'
